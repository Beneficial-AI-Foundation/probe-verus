# BAIF Verus Extract Action
# Runs Verus formal verification and produces verification results JSON
#
# Usage:
#   - uses: beneficial-ai-foundation/probe-verus/action@v4
#     with:
#       project-path: ./my-verus-crate
#     # outputs: results-file, atoms-file, verified-count, total-functions

name: 'BAIF Verus Extract'
description: 'Run Verus formal verification on a Rust/Verus project and produce verification results'
author: 'Beneficial AI Foundation'

branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  project-path:
    description: 'Path to the Verus project (directory containing Cargo.toml with verus metadata)'
    required: true
  package:
    description: 'Package name for workspace projects (passed to probe-verus extract -p)'
    required: false
    default: ''
  verus-version:
    description: 'Verus version to use (default: auto-detect from Cargo.toml [package.metadata.verus] release)'
    required: false
    default: ''
  rust-version:
    description: 'Rust toolchain version (default: auto-detect from Cargo.toml [package.metadata.verus] rust-version)'
    required: false
    default: ''
  output-dir:
    description: 'Directory for output files (default: current directory)'
    required: false
    default: '.'
  token:
    description: 'GitHub token for API calls (avoids rate limiting)'
    required: false
    default: ${{ github.token }}
  verus-args:
    description: 'Extra arguments passed to Verus (e.g. --log smt --log-dir ./smt-logs -V spinoff-all)'
    required: false
    default: ''

outputs:
  results-file:
    description: 'Path to the verification results JSON file'
    value: ${{ steps.verify.outputs.results_file }}
  atoms-file:
    description: 'Path to the atoms JSON file (call graph)'
    value: ${{ steps.atomize.outputs.atoms_file }}
  verified-count:
    description: 'Number of functions verified'
    value: ${{ steps.verify.outputs.verified_count }}
  total-functions:
    description: 'Total number of functions'
    value: ${{ steps.verify.outputs.total_count }}
  verus-version:
    description: 'Verus version used for verification'
    value: ${{ steps.versions.outputs.verus_version }}
  rust-version:
    description: 'Rust toolchain version used'
    value: ${{ steps.versions.outputs.rust_version }}
  smt-log-dir:
    description: 'Path to the SMT log directory (if verus-args includes --log smt)'
    value: ${{ steps.verify.outputs.smt_log_dir }}

runs:
  using: 'composite'
  steps:
    # Step 1: Install probe-verus (needed before --detect-version)
    - name: Install probe-verus
      shell: bash
      run: |
        echo "Installing probe-verus..."
        cargo install --force --git https://github.com/Beneficial-AI-Foundation/probe-verus
        probe-verus --version || echo "probe-verus installed"

    # Step 2: Detect Verus version (from explicit input or Cargo.toml)
    - name: Detect Verus version
      id: versions
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
      run: |
        PROJECT_PATH="${{ inputs.project-path }}"
        CARGO_TOML="$PROJECT_PATH/Cargo.toml"

        if [ ! -f "$CARGO_TOML" ]; then
          echo "::error::Cargo.toml not found at $CARGO_TOML"
          exit 1
        fi

        # Detect Verus version: explicit input or probe-verus auto-detection
        VERUS_VERSION="${{ inputs.verus-version }}"
        if [ -z "$VERUS_VERSION" ]; then
          VERUS_VERSION=$(PROBE_VERUS_VERSION="" probe-verus setup --from-project "$PROJECT_PATH" --detect-version 2>/dev/null) || true
          if [ -n "$VERUS_VERSION" ]; then
            echo "Auto-detected Verus version: $VERUS_VERSION"
          else
            echo "::error::No Verus version found. Provide verus-version input, add [package.metadata.verus] release to Cargo.toml, or use a vstd/verus_builtin dep with a rev matching a Verus release tag"
            exit 1
          fi
        fi

        # Detect Rust toolchain: explicit input or from Verus release's rust-toolchain.toml
        RUST_VERSION="${{ inputs.rust-version }}"
        if [ -z "$RUST_VERSION" ]; then
          RUST_VERSION=$(PROBE_VERUS_VERSION="$VERUS_VERSION" probe-verus setup --detect-toolchain 2>/dev/null) || true
          if [ -n "$RUST_VERSION" ]; then
            echo "Auto-detected Rust toolchain from Verus release: $RUST_VERSION"
          else
            echo "::warning::Could not detect Rust toolchain from Verus release, probe-verus setup will attempt installation"
          fi
        fi

        echo "verus_version=$VERUS_VERSION" >> $GITHUB_OUTPUT
        echo "rust_version=$RUST_VERSION" >> $GITHUB_OUTPUT

    # Step 3: Install Rust toolchain (explicit or auto-detected from Verus release)
    - name: Install Rust toolchain
      if: steps.versions.outputs.rust_version != ''
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ steps.versions.outputs.rust_version }}

    # Step 4: Cache tools and cargo registry
    - name: Cache cargo registry and tools
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          ~/.cargo/bin
          ~/.probe-verus/tools
        key: ${{ runner.os }}-cargo-verus-${{ steps.versions.outputs.verus_version }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-verus-${{ steps.versions.outputs.verus_version }}-
          ${{ runner.os }}-cargo-verus-
          ${{ runner.os }}-cargo-

    # Step 5: Install all tools (verus-analyzer, scip, verus + Rust toolchain)
    - name: Install tools
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        PROBE_VERUS_VERSION: ${{ steps.versions.outputs.verus_version }}
      run: |
        # If toolchain was already installed by dtolnay/rust-toolchain, skip rustup step
        SKIP_TC=""
        if [ -n "${{ steps.versions.outputs.rust_version }}" ]; then
          SKIP_TC="--skip-toolchain"
        fi
        probe-verus setup --from-project "${{ inputs.project-path }}" $SKIP_TC

    # Step 6: Run probe-verus atomize
    - name: Run probe-verus atomize
      id: atomize
      shell: bash
      run: |
        PROJECT_PATH="${{ inputs.project-path }}"
        OUTPUT_DIR="${{ inputs.output-dir }}"
        ATOMS_FILE="$OUTPUT_DIR/atoms.json"

        mkdir -p "$OUTPUT_DIR"

        echo "=== Running probe-verus atomize ==="
        echo "Project: $PROJECT_PATH"

        probe-verus atomize "$PROJECT_PATH" -o "$ATOMS_FILE"

        echo ""
        echo "=== Generated atoms.json ==="
        ls -la "$ATOMS_FILE"
        ATOM_COUNT=$(jq '.data | length' "$ATOMS_FILE")
        echo "Number of atoms: $ATOM_COUNT"

        echo "atoms_file=$(realpath "$ATOMS_FILE")" >> $GITHUB_OUTPUT

    # Step 7: Run probe-verus run-verus (standalone verification)
    - name: Run probe-verus run-verus
      id: verify
      shell: bash
      run: |
        PROJECT_PATH="${{ inputs.project-path }}"
        OUTPUT_DIR="${{ inputs.output-dir }}"
        RESULTS_FILE="$OUTPUT_DIR/results.json"
        ATOMS_FILE="$OUTPUT_DIR/atoms.json"
        PACKAGE="${{ inputs.package }}"

        echo "=== Running probe-verus run-verus ==="
        echo "Project: $PROJECT_PATH"

        VERUS_ARGS="${{ inputs.verus-args }}"

        CMD="probe-verus run-verus $PROJECT_PATH -o $RESULTS_FILE -a $ATOMS_FILE"
        if [ -n "$PACKAGE" ]; then
          CMD="$CMD -p $PACKAGE"
        fi
        if [ -n "$VERUS_ARGS" ]; then
          CMD="$CMD --verus-args $VERUS_ARGS"
        fi

        echo "Running: $CMD"
        $CMD

        # If verus-args included --log-dir, expose it as output
        SMT_LOG_DIR=""
        if echo "$VERUS_ARGS" | grep -q "\-\-log-dir"; then
          SMT_LOG_DIR=$(echo "$VERUS_ARGS" | grep -oP '(?<=--log-dir\s)\S+')
          if [ -n "$SMT_LOG_DIR" ] && [ -d "$PROJECT_PATH/$SMT_LOG_DIR" ]; then
            SMT_LOG_DIR="$PROJECT_PATH/$SMT_LOG_DIR"
          fi
        fi
        echo "smt_log_dir=$SMT_LOG_DIR" >> $GITHUB_OUTPUT

        echo ""
        echo "=== Verification Results ==="
        ls -la "$RESULTS_FILE"

        DATA_EXPR='if .data then .data else . end'

        if jq -e "($DATA_EXPR) | type == \"object\" and (keys | length) > 0 and (.[keys[0]] | has(\"verified\"))" "$RESULTS_FILE" > /dev/null 2>&1; then
          TOTAL=$(jq -r "($DATA_EXPR) | keys | length" "$RESULTS_FILE")
          VERIFIED=$(jq -r "[($DATA_EXPR) | .[] | select(.verified == true)] | length" "$RESULTS_FILE")
          echo "Parsed proofs format (dictionary with verified field)"
        elif jq -e "($DATA_EXPR) | .summary" "$RESULTS_FILE" > /dev/null 2>&1; then
          VERIFIED=$(jq -r "($DATA_EXPR) | .summary.verified // .summary.verified_functions // 0" "$RESULTS_FILE")
          TOTAL=$(jq -r "($DATA_EXPR) | .summary.total // .summary.total_functions // 0" "$RESULTS_FILE")
          echo "Parsed verification-report format (with .summary)"
        else
          echo "WARNING: Could not parse results format, defaulting to 0"
          VERIFIED=0
          TOTAL=0
        fi

        echo "Verified: $VERIFIED / $TOTAL"

        echo "results_file=$(realpath "$RESULTS_FILE")" >> $GITHUB_OUTPUT
        echo "verified_count=$VERIFIED" >> $GITHUB_OUTPUT
        echo "total_count=$TOTAL" >> $GITHUB_OUTPUT
